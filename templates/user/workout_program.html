{% extends "base.html" %}

{% block title %}Workout Program | FitDiscipline{% endblock %}
{% block page_id %}workout_program{% endblock %}

{% block content %}
<h1 class="h4 mb-1">Workout Program</h1>
<p class="text-muted mb-3">Create, list, and activate workout plans.</p>

<div class="card app-card shadow-sm mb-3">
  <div class="card-body">
    <form id="workout-plan-form" class="row g-2">
      <div class="col-md-3"><input class="form-control" name="user_id" placeholder="User ID" required /></div>
      <div class="col-md-3"><input class="form-control" name="fitness_level_at" type="number" min="1" max="5" value="1" required /></div>
      <div class="col-md-3">
        <select class="form-select" name="goal_type" required>
          <option value="cut">cut</option>
          <option value="bulk">bulk</option>
          <option value="maintain">maintain</option>
        </select>
      </div>
      <div class="col-md-3"><input class="form-control" name="target_weight_kg" type="number" step="0.1" placeholder="Target weight" required /></div>
      <div class="col-md-3">
        <select class="form-select" name="status">
          <option value="draft">draft</option>
          <option value="active">active</option>
        </select>
      </div>
      <div class="col-md-3 form-check mt-2 ms-2"><input class="form-check-input" type="checkbox" name="ai_generated" id="wp_ai_generated"><label class="form-check-label" for="wp_ai_generated">AI generated</label></div>
      <div class="col-12"><button class="btn btn-primary" type="submit">Create Workout Plan</button></div>
    </form>
  </div>
</div>

<div class="card app-card shadow-sm">
  <div class="card-body">
    <form id="workout-plan-list-form" class="row g-2 mb-3">
      <div class="col-md-4"><input class="form-control" name="user_id" placeholder="User ID" required /></div>
      <div class="col-md-4"><input class="form-control" name="status" placeholder="status filter (optional)" /></div>
      <div class="col-md-4"><button class="btn btn-outline-primary w-100" type="submit">Load Plans</button></div>
    </form>
    <div class="row g-2 mb-3">
      <div class="col-md-4"><input id="activate-workout-user-id" class="form-control" placeholder="User ID" /></div>
      <div class="col-md-4"><input id="activate-workout-plan-id" class="form-control" placeholder="Plan ID to activate" /></div>
      <div class="col-md-4"><button id="btn-activate-workout-plan" class="btn btn-outline-success w-100" type="button">Activate Plan</button></div>
    </div>
    <pre id="workout-plan-output" class="output-box mb-0"></pre>
  </div>
</div>
{% endblock %}
