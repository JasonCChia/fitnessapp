<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | FitDiscipline</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-5">
        <div class="card shadow-sm app-card">
          <div class="card-body p-4">
            <h1 class="h4 mb-3">Login User</h1>
            <p class="text-muted small">Masuk dulu untuk buka halaman home dan data milik user ini.</p>

            {% if error %}
            <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/user/login">
              <input type="hidden" name="next" value="{{ request.args.get('next', '') }}" />
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" minlength="8" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">Masuk</button>
            </form>

            <p class="small text-muted mt-3 mb-0">
              Belum punya akun?
              <a href="/user/register">Register di sini</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
