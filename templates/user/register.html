<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | FitDiscipline</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-6">
        <div class="card shadow-sm app-card">
          <div class="card-body p-4">
            <h1 class="h4 mb-3">Create Account</h1>
            <p class="text-muted small">Buat akun dulu, lalu lanjut onboarding.</p>

            {% if error %}
            <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/user/register">
              <div class="mb-3">
                <label class="form-label">Nama</label>
                <input type="text" name="name" class="form-control" required />
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input type="email" name="email" class="form-control" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Gender</label>
                  <select name="gender" class="form-select" required>
                    <option value="">Pilih...</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                  </select>
                </div>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">Birth Date</label>
                  <input type="date" name="birth_date" class="form-control" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Height (cm)</label>
                  <input type="number" step="0.1" min="50" max="300" name="height_cm" class="form-control" required />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" minlength="8" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>

            <p class="small text-muted mt-3 mb-0">
              Sudah punya akun?
              <a href="/user/login">Login di sini</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
